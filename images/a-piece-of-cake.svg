<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="a piece of cake">
  <rect width="200" height="200" rx="24" fill="#0f172a"/>
  <!-- plate -->
  <ellipse cx="100" cy="150" rx="68" ry="12" fill="#334155"/>
  <!-- cake slice body -->
  <path d="M60 150 L100 60 L140 150 Z" fill="#fde68a" stroke="#f59e0b" stroke-width="3"/>
  <!-- sponge layers -->
  <path d="M72 122 L100 122 M68 134 L132 134" stroke="#d97706" stroke-width="4" stroke-linecap="round"/>
  <!-- frosting top -->
  <path d="M100 60 q14 30 26 48 q-26 8 -52 0 q12 -20 26 -48 Z" fill="#f472b6"/>
  <!-- cherry -->
  <circle cx="100" cy="64" r="9" fill="#ef4444"/>
  <path d="M100 56 q8 -10 16 -8" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
</svg>
