  <rect x="52" y="92" width="96" height="44" rx="12" fill="#7f1d1d"/>
  <rect x="58" y="98" width="84" height="14" rx="4" fill="#f8fafc"/>
  <rect x="58" y="116" width="84" height="14" rx="4" fill="#f8fafc"/>
