<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="call it a day">
  <rect width="200" height="200" rx="24" fill="#0f172a"/>
  <!-- sky -->
  <rect x="20" y="40" width="160" height="90" rx="8" fill="#1e293b"/>
  <!-- setting sun -->
  <circle cx="100" cy="118" r="34" fill="#fb923c"/>
  <circle cx="100" cy="118" r="34" fill="#f59e0b" opacity="0.5"/>
  <!-- rays -->
  <g stroke="#fbbf24" stroke-width="4" stroke-linecap="round">
    <path d="M100 64 v-14 M62 80 l-9 -9 M138 80 l9 -9 M48 110 h-14 M152 110 h14"/>
  </g>
  <!-- horizon ground -->
  <rect x="20" y="126" width="160" height="44" rx="8" fill="#0e7490"/>
  <path d="M20 130 h160" stroke="#155e75" stroke-width="3"/>
  <!-- reflection -->
  <path d="M84 140 h32 M78 152 h44" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
</svg>
