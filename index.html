<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 更新が確実に反映されるよう、HTMLは毎回サーバーに確認しに行く -->
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
    <title>英熟語マスター | Idiom Master</title>
    <!-- ?v=… のバージョンは、CSS/JSを更新したら数字を上げる（キャッシュ対策） -->
    <link rel="stylesheet" href="styles.css?v=4" />
  </head>
  <body>
    <button id="music-toggle" class="music-toggle" aria-label="バトルBGMのオン/オフ" title="バトルBGMのオン/オフ">🔊</button>
    <header id="app-header">
      <h1>英熟語マスター 🗣️</h1>
      <p class="subtitle">イメージで覚えて、文章で使えるようになる</p>
    </header>

    <main>
      <!-- ① レベル選択（最初の画面） -->
      <section id="level-select" class="view">
        <p class="home-lead">レベルを選ぼう</p>
        <div class="mode-grid" id="level-grid"><!-- JSで生成 --></div>
      </section>

      <!-- ② モード選択 -->
      <section id="home" class="view is-hidden">
        <button class="back-btn" data-back="level-select">← レベル選択にもどる</button>
        <p class="home-lead"><span id="home-level-label"></span></p>
        <div class="mode-grid">
          <button class="mode-card" data-go="flashcards">
            <span class="mode-icon">📇</span>
            <span class="mode-title">英熟語を学ぶ</span>
            <span class="mode-desc">フラッシュカードでイメージと一緒に覚える</span>
          </button>
          <button class="mode-card" data-go="quiz">
            <span class="mode-icon">✍️</span>
            <span class="mode-title">文章に当てはめる</span>
            <span class="mode-desc">学んだ熟語を例文の空欄に入力する</span>
          </button>
          <button class="mode-card" data-go="battle">
            <span class="mode-icon">⚔️</span>
            <span class="mode-title">英熟語バトル</span>
            <span class="mode-desc">クイズに正解して敵を倒すローグライク</span>
          </button>
        </div>
      </section>

      <!-- セット選択（10問ずつのグループを選ぶ） -->
      <section id="set-select" class="view is-hidden">
        <button class="back-btn" data-back="home">← モード選択にもどる</button>
        <p class="home-lead" id="set-select-title">挑戦するセットを選ぼう</p>
        <div class="set-grid" id="set-grid"><!-- JSで生成 --></div>
      </section>

      <!-- フラッシュカード -->
      <section id="flashcards" class="view is-hidden">
        <button class="back-btn" data-back="home">← モード選択にもどる</button>
        <div class="progress" id="card-progress"></div>
        <div class="card" id="card">
          <div class="card-inner">
            <div class="card-face card-front">
              <div class="card-image" id="card-image"></div>
              <div class="card-phrase" id="card-phrase"></div>
              <p class="card-hint">カードをクリック／<kbd class="kbd">スペース</kbd>で意味を表示</p>
            </div>
            <div class="card-face card-back">
              <div class="card-meaning" id="card-meaning"></div>
              <div class="card-example" id="card-example"></div>
              <div class="card-example-ja" id="card-example-ja"></div>
              <div class="card-origin" id="card-origin"></div>
            </div>
          </div>
        </div>
        <div class="controls">
          <button id="prev-card">← 前へ <kbd class="kbd">←</kbd></button>
          <button id="next-card">次へ → <kbd class="kbd">→</kbd></button>
        </div>
        <button id="mark-done" class="done-btn">⬜ できた！チェック</button>
        <button id="mark-all-done" class="done-btn">✅ このセットを全部「できた」に</button>
        <button id="go-quiz-unchecked" class="go-quiz-btn">✍️ このセットの覚えてない単語で穴埋めへ →</button>
        <button id="card-next-set-go" class="go-quiz-btn is-hidden">➡️ 次の10問へ（次のセット） <kbd class="kbd">N</kbd></button>
        <button id="card-next-set" class="next-set-btn">📚 セット選択にもどる</button>
      </section>

      <!-- 穴埋め入力 -->
      <section id="quiz" class="view is-hidden">
        <button class="back-btn" data-back="home">← モード選択にもどる</button>
        <div class="quiz-filter">
          <span id="quiz-filter-info"></span>
          <label><input type="checkbox" id="include-mastered" /> ✅できた単語も出題する</label>
        </div>
        <div class="progress" id="quiz-progress"></div>
        <div class="quiz-card">
          <div class="quiz-image" id="quiz-image"></div>
          <p class="quiz-meaning" id="quiz-meaning"></p>
          <p class="quiz-sentence" id="quiz-sentence"></p>
          <form id="quiz-form" autocomplete="off">
            <input
              type="text"
              id="quiz-input"
              placeholder="空欄に入る英熟語を入力"
              aria-label="解答"
            />
            <button type="submit" id="quiz-submit">答え合わせ</button>
          </form>
          <p class="quiz-feedback" id="quiz-feedback"></p>
          <button id="quiz-next" class="is-hidden">次の問題 →</button>
        </div>
        <button id="quiz-to-learn" class="go-quiz-btn">📇 このセットを英熟語で学ぶ →</button>
        <div class="quiz-result is-hidden" id="quiz-result"></div>
      </section>

      <!-- 英熟語バトル（ローグライク） -->
      <section id="battle" class="view is-hidden">
        <button class="back-btn" data-back="home">← Back to menu</button>
        <div class="battle-stage">
          <div class="coin-badge" id="coin-badge">🪙 0</div>
          <div class="combo-badge is-hidden" id="combo-badge"></div>
          <div class="floor-label" id="floor-label"></div>
          <div class="enemy-emoji" id="enemy-emoji"></div>
          <div class="enemy-name" id="enemy-name"></div>
          <div class="enemy-intent is-hidden" id="enemy-intent"></div>
          <div class="hp-row">
            <div class="hp-bar"><div class="hp-fill enemy" id="enemy-hp-fill"></div></div>
            <span class="hp-text" id="enemy-hp-text"></span>
          </div>
        </div>

        <div class="battle-message" id="battle-message">Answer correctly to attack!</div>

        <div class="route-map is-hidden" id="route-map"><!-- JSで生成 --></div>

        <div class="player-status">
          <span class="player-label">You ❤️</span>
          <div class="hp-row">
            <div class="hp-bar"><div class="hp-fill player" id="player-hp-fill"></div></div>
            <span class="hp-text" id="player-hp-text"></span>
          </div>
          <div class="equip-panel" id="equip-panel"></div>
          <div class="player-stats" id="player-stats"></div>
          <div class="player-stats damage-stats" id="damage-stats"></div>
          <div class="status-row is-hidden" id="status-row"></div>
        </div>

        <div class="battle-card">
          <div class="stance-row" id="stance-row"></div>
          <p class="quiz-meaning" id="battle-hint"></p>
          <p class="quiz-sentence" id="battle-sentence"></p>
          <form id="battle-form" autocomplete="off">
            <input
              type="text"
              id="battle-input"
              placeholder="Type the missing word to attack!"
              aria-label="answer"
            />
            <button type="submit" id="battle-attack">⚔️ Attack</button>
          </form>
          <div class="battle-tools">
            <button type="button" id="open-backpack" class="open-shop-btn">🎒 Backpack</button>
            <button type="button" id="open-items" class="open-shop-btn">🧪 Items</button>
            <button type="button" id="detonate-bomb" class="open-shop-btn is-hidden">💣 Detonate</button>
            <button type="button" id="use-skill" class="open-shop-btn skill-btn is-hidden">✨ Skill</button>
          </div>
        </div>

        <div class="battle-reward is-hidden" id="battle-reward">
          <p class="reward-title" id="reward-title">🎁 Choose a reward</p>
          <div class="reward-grid" id="reward-grid"></div>
        </div>

        <div class="battle-over is-hidden" id="battle-over"></div>
      </section>
    </main>

    <script src="idioms.js?v=4"></script>
    <script src="equipment.js?v=4"></script>
    <script src="music.js?v=4"></script>
    <script src="lib.js?v=4"></script>
    <script src="app.js?v=4"></script>
  </body>
</html>
